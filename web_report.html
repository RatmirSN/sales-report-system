<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчет по выполнению плана подключения новых абонентов</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #555;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .table-section {
            margin-top: 30px;
        }

        .table-section h2 {
            color: #555;
            margin-bottom: 20px;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #4472C4;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-completed {
            background: #C6EFCE;
            color: #006100;
            padding: 5px 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
        }

        .status-in-progress {
            background: #FFEB9C;
            color: #9C5700;
            padding: 5px 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
        }

        .status-critical {
            background: #FFC7CE;
            color: #9C0006;
            padding: 5px 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
        }

        .summary {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .summary h3 {
            color: #555;
            margin-bottom: 15px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .summary-item {
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .summary-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .summary-item .label {
            color: #777;
            font-size: 12px;
            margin-top: 5px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .dashboard-section {
            margin-top: 30px;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
        }

        .dashboard-section h2 {
            color: #555;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Отчет по выполнению плана подключения новых абонентов</h1>
        
        <div class="form-section">
            <h2>➕ Добавить данные сотрудника</h2>
            <form id="employeeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="employeeName">ФИО сотрудника</label>
                        <input type="text" id="employeeName" required placeholder="Иванов И.И.">
                    </div>
                    <div class="form-group">
                        <label for="reportDate">Дата отчета</label>
                        <input type="date" id="reportDate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="plan">План (количество подключений)</label>
                        <input type="number" id="plan" required min="0" placeholder="50">
                    </div>
                    <div class="form-group">
                        <label for="fact">Факт (выполнено)</label>
                        <input type="number" id="fact" required min="0" placeholder="52">
                    </div>
                    <div class="form-group">
                        <label for="applications">Заявок в работе</label>
                        <input type="number" id="applications" required min="0" placeholder="3">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Добавить</button>
            </form>
        </div>

        <div class="table-section">
            <h2>📋 Текущий отчет</h2>
            <div id="reportTable"></div>
            <div class="actions" id="exportSection" style="display: none;">
                <button onclick="exportToExcel()" class="btn btn-success">📥 Выгрузить в Excel</button>
            </div>
        </div>

        <div class="dashboard-section" id="dashboardSection" style="display: none;">
            <h2>📈 Динамика выполнения плана (нарастающий итог)</h2>
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <div class="summary" id="summarySection" style="display: none;">
            <h3>📈 Сводная информация</h3>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="value" id="totalEmployees">0</div>
                    <div class="label">Всего сотрудников</div>
                </div>
                <div class="summary-item">
                    <div class="value" id="totalPlan">0</div>
                    <div class="label">Общий план</div>
                </div>
                <div class="summary-item">
                    <div class="value" id="totalFact">0</div>
                    <div class="label">Общий факт</div>
                </div>
                <div class="summary-item">
                    <div class="value" id="totalApplications">0</div>
                    <div class="label">Заявок в работе</div>
                </div>
                <div class="summary-item">
                    <div class="value" id="avgPerformance">0%</div>
                    <div class="label">Среднее выполнение</div>
                </div>
                <div class="summary-item">
                    <div class="value" id="completedCount">0</div>
                    <div class="label">Выполнили план</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Загрузка данных из localStorage
        function loadData() {
            const data = localStorage.getItem('salesReportData');
            return data ? JSON.parse(data) : [];
        }

        // Сохранение данных в localStorage
        function saveData(data) {
            localStorage.setItem('salesReportData', JSON.stringify(data));
        }

        // Расчет выполнения плана
        function calculatePerformance(plan, fact) {
            if (plan === 0) return 0;
            return ((fact / plan) * 100).toFixed(2);
        }

        // Расчет отклонения
        function calculateDeviation(plan, fact) {
            return fact - plan;
        }

        // Определение статуса
        function getStatus(performance) {
            if (performance >= 100) return { text: 'Выполнен', class: 'status-completed' };
            if (performance >= 50) return { text: 'В процессе', class: 'status-in-progress' };
            return { text: 'Критично', class: 'status-critical' };
        }

        // Отрисовка таблицы
        function renderTable() {
            const data = loadData();
            const tableContainer = document.getElementById('reportTable');
            const summarySection = document.getElementById('summarySection');

            if (data.length === 0) {
                tableContainer.innerHTML = '<div class="empty-state">Данные отсутствуют. Добавьте первого сотрудника.</div>';
                summarySection.style.display = 'none';
                document.getElementById('exportSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'none';
                return;
            }

            document.getElementById('exportSection').style.display = 'flex';
            document.getElementById('dashboardSection').style.display = 'block';

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Сотрудник</th>
                            <th>Дата</th>
                            <th>План</th>
                            <th>Факт</th>
                            <th>Заявок в работе</th>
                            <th>Выполнение %</th>
                            <th>Отклонение</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach((item, index) => {
                const performance = calculatePerformance(item.plan, item.fact);
                const deviation = calculateDeviation(item.plan, item.fact);
                const status = getStatus(performance);

                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.date}</td>
                        <td>${item.plan}</td>
                        <td>${item.fact}</td>
                        <td>${item.applications}</td>
                        <td>${performance}%</td>
                        <td>${deviation > 0 ? '+' : ''}${deviation}</td>
                        <td><span class="${status.class}">${status.text}</span></td>
                        <td>
                            <button onclick="deleteEmployee(${index})" class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;">Удалить</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            tableContainer.innerHTML = html;

            // Обновляем сводную информацию
            updateSummary(data);

            // Обновляем график
            updateChart(data);
        }

        // Обновление сводной информации
        function updateSummary(data) {
            const summarySection = document.getElementById('summarySection');
            summarySection.style.display = 'block';

            const totalPlan = data.reduce((sum, item) => sum + item.plan, 0);
            const totalFact = data.reduce((sum, item) => sum + item.fact, 0);
            const totalApplications = data.reduce((sum, item) => sum + item.applications, 0);
            const avgPerformance = totalPlan > 0 ? ((totalFact / totalPlan) * 100).toFixed(2) : 0;
            const completedCount = data.filter(item => calculatePerformance(item.plan, item.fact) >= 100).length;

            document.getElementById('totalEmployees').textContent = data.length;
            document.getElementById('totalPlan').textContent = totalPlan;
            document.getElementById('totalFact').textContent = totalFact;
            document.getElementById('totalApplications').textContent = totalApplications;
            document.getElementById('avgPerformance').textContent = avgPerformance + '%';
            document.getElementById('completedCount').textContent = completedCount;
        }

        // Обновление графика
        let performanceChart = null;

        function updateChart(data) {
            // Сортируем данные по дате
            const sortedData = [...data].sort((a, b) => new Date(a.date) - new Date(b.date));

            // Группируем данные по датам
            const groupedData = {};
            sortedData.forEach(item => {
                if (!groupedData[item.date]) {
                    groupedData[item.date] = { plan: 0, fact: 0 };
                }
                groupedData[item.date].plan += item.plan;
                groupedData[item.date].fact += item.fact;
            });

            // Получаем уникальные даты в отсортированном порядке
            const dates = Object.keys(groupedData).sort();
            
            // Рассчитываем нарастающий итог
            let cumulativePlan = 0;
            let cumulativeFact = 0;
            const cumulativePlanData = [];
            const cumulativeFactData = [];

            dates.forEach(date => {
                cumulativePlan += groupedData[date].plan;
                cumulativeFact += groupedData[date].fact;
                cumulativePlanData.push(cumulativePlan);
                cumulativeFactData.push(cumulativeFact);
            });

            // Форматируем даты для отображения
            const formattedDates = dates.map(date => {
                const d = new Date(date);
                return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
            });

            const ctx = document.getElementById('performanceChart').getContext('2d');

            // Уничтожаем предыдущий график если есть
            if (performanceChart) {
                performanceChart.destroy();
            }

            // Создаем новый график
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: formattedDates,
                    datasets: [
                        {
                            label: 'План (нарастающий итог)',
                            data: cumulativePlanData,
                            borderColor: '#4472C4',
                            backgroundColor: 'rgba(68, 114, 196, 0.1)',
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Факт (нарастающий итог)',
                            data: cumulativeFactData,
                            borderColor: '#27ae60',
                            backgroundColor: 'rgba(39, 174, 96, 0.1)',
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        title: {
                            display: true,
                            text: 'Динамика выполнения плана'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Количество подключений'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Дата'
                            }
                        }
                    }
                }
            });
        }

        // Удаление сотрудника
        function deleteEmployee(index) {
            if (confirm('Вы уверены, что хотите удалить запись?')) {
                const data = loadData();
                data.splice(index, 1);
                saveData(data);
                renderTable();
            }
        }

        // Экспорт в Excel
        function exportToExcel() {
            const data = loadData();
            
            const exportData = data.map(item => {
                const performance = calculatePerformance(item.plan, item.fact);
                const deviation = calculateDeviation(item.plan, item.fact);
                const status = getStatus(performance);
                
                return {
                    'Сотрудник': item.name,
                    'Дата': item.date,
                    'План': item.plan,
                    'Факт': item.fact,
                    'Заявок в работе': item.applications,
                    'Выполнение %': parseFloat(performance),
                    'Отклонение': deviation,
                    'Статус': status.text
                };
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(exportData);

            ws['!cols'] = [
                { wch: 20 },
                { wch: 10 },
                { wch: 10 },
                { wch: 15 },
                { wch: 12 },
                { wch: 12 },
                { wch: 12 }
            ];

            XLSX.utils.book_append_sheet(wb, ws, 'Отчет');

            const now = new Date();
            const dateStr = now.toISOString().slice(0, 10);
            const timeStr = now.toTimeString().slice(0, 5).replace(':', '-');
            const filename = `sales_report_${dateStr}_${timeStr}.xlsx`;

            XLSX.writeFile(wb, filename);
        }

        // Обработка формы
        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const employee = {
                name: document.getElementById('employeeName').value,
                date: document.getElementById('reportDate').value,
                plan: parseInt(document.getElementById('plan').value),
                fact: parseInt(document.getElementById('fact').value),
                applications: parseInt(document.getElementById('applications').value)
            };

            const data = loadData();
            data.push(employee);
            saveData(data);

            // Очистка формы
            this.reset();

            // Обновление таблицы
            renderTable();

            alert('Данные успешно добавлены!');
        });

        // Инициализация при загрузке страницы
        renderTable();

        // Устанавливаем текущую дату по умолчанию
        document.getElementById('reportDate').valueAsDate = new Date();
    </script>
</body>
</html>
